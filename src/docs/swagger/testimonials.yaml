components:
  schemas:
    TestimonialInput:
      type: object
      properties:
        clientName:
          type: string
        content:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        active:
          type: boolean

paths:
  /api/testimonials:
    get:
      tags:
        - Testimonials
      summary: Retrieve all testimonials
      responses:
        "200":
          description: List of testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TestimonialInput"

    post:
      tags:
        - Testimonials
      summary: Add a new testimonial
      security:
        - cookieAuth: []
      responses:
        "201":
          description: Created
        "401":
          description: Unauthorized (Requires ADMIN or EDITOR)

  /api/testimonials/{id}:
    put:
      tags:
        - Testimonials
      summary: Update a testimonial
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Testimonial updated
        "401":
          description: Unauthorized

    delete:
      tags:
        - Testimonials
      summary: Delete a testimonial
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed successfully
        "401":
          description: Unauthorized (Requires ADMIN)
