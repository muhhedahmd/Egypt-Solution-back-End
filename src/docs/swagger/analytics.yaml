components:
  schemas:
    AnalyticsInput:
      type: object
      properties:
        period:
          type: string
          enum: [7d, 30d, 90d, 12m]

paths:
  /api/analytics/overview:
    get:
      tags:
        - Analytics
      summary: Retrieve general overview analytics
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [7d, 30d, 90d, 12m]
      responses:
        "200":
          description: Analytics data returned
        "401":
          description: Unauthorized (Requires ADMIN)

  /api/analytics/top-pages:
    get:
      tags:
        - Analytics
      summary: Retrieve most visited pages stats
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Pages statistics returned
        "401":
          description: Unauthorized (Requires ADMIN)

  /api/analytics/traffic-sources:
    get:
      tags:
        - Analytics
      summary: Retrieve metrics on traffic sources
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Traffic source data
        "401":
          description: Unauthorized (Requires ADMIN)
